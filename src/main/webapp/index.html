<!DOCTYPE html>
<html>
<head>
    <title>Prescription Tracker</title>
</head>
<body>

<h2>Enter Prescription Details</h2>

<form action="PrescriptionServlet" method="post">
    ID: <input type="text" name="id"><br><br>
    Patient Name: <input type="text" name="patient"><br><br>
    Doctor Name: <input type="text" name="doctor"><br><br>
    Medicine: <input type="text" name="medicine"><br><br>
    Dosage: <input type="text" name="dosage"><br><br>
    Days: <input type="text" name="days"><br><br>
    Cost per Day: <input type="text" name="cost"><br><br>
    <input type="submit" value="Save">
</form>

</body>
</html>
